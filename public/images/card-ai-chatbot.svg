<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs><linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c0c18"/><stop offset="100%" stop-color="#14142a"/></linearGradient></defs>
  <rect width="600" height="340" fill="url(#bg1)"/>
  <!-- Browser frame -->
  <rect x="80" y="30" width="440" height="280" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <circle cx="100" cy="44" r="4" fill="rgba(255,80,80,0.3)"/><circle cx="114" cy="44" r="4" fill="rgba(255,200,50,0.3)"/><circle cx="128" cy="44" r="4" fill="rgba(80,200,80,0.3)"/>
  <rect x="160" y="39" width="200" height="10" rx="5" fill="rgba(255,255,255,0.04)"/>
  <!-- Page content area -->
  <rect x="92" y="58" width="416" height="244" rx="4" fill="rgba(255,255,255,0.01)"/>
  <!-- Page lines -->
  <rect x="110" y="72" width="120" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="110" y="86" width="200" height="4" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="110" y="96" width="180" height="4" rx="2" fill="rgba(255,255,255,0.03)"/>
  <!-- Chat widget (bottom-right) -->
  <rect x="370" y="140" width="126" height="150" rx="10" fill="rgba(255,159,65,0.04)" stroke="rgba(255,159,65,0.15)" stroke-width="1"/>
  <!-- Chat header -->
  <rect x="380" y="150" width="60" height="5" rx="2.5" fill="rgba(255,159,65,0.25)"/>
  <rect x="380" y="160" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <!-- Bot message -->
  <rect x="380" y="174" width="90" height="24" rx="6" fill="rgba(255,159,65,0.06)" stroke="rgba(255,159,65,0.12)" stroke-width="0.5"/>
  <rect x="388" y="181" width="65" height="3" rx="1.5" fill="rgba(255,159,65,0.2)"/>
  <rect x="388" y="188" width="50" height="3" rx="1.5" fill="rgba(255,159,65,0.12)"/>
  <!-- User message -->
  <rect x="420" y="206" width="66" height="18" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <rect x="428" y="213" width="42" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <!-- Bot reply -->
  <rect x="380" y="232" width="100" height="20" rx="6" fill="rgba(255,159,65,0.06)" stroke="rgba(255,159,65,0.12)" stroke-width="0.5"/>
  <rect x="388" y="239" width="75" height="3" rx="1.5" fill="rgba(255,159,65,0.2)"/>
  <!-- Input -->
  <rect x="380" y="260" width="106" height="16" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <!-- Chat trigger dot -->
  <circle cx="484" cy="282" r="8" fill="rgba(255,159,65,0.15)" stroke="rgba(255,159,65,0.3)" stroke-width="1"/>
</svg>
