<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Theme / PWA meta -->
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Enigma" />

  <!-- Search Console / Webmaster verification — replace YOUR_*_TOKEN with real values -->
  <meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_TOKEN" />
  <meta name="msvalidate.01" content="YOUR_BING_VERIFICATION_TOKEN" />

  <!-- Preload hero image for LCP -->
  <link rel="preload" as="image" href="/assets/hero-static.webp" type="image/webp" fetchpriority="high" />

  <!-- Google Fonts — preconnect + stylesheet (non-render-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
  </noscript>

  <!-- Prefetch hints for likely next-page routes -->
  <link rel="prefetch" href="/about" />
  <link rel="prefetch" href="/contact" />
  <link rel="prefetch" href="/ai-systems" />

  <!--
    ALL SEO tags (title, description, og:*, twitter:*, canonical) are
    injected per-route by the React <SEO /> component via React 19 head
    hoisting. Nothing is hardcoded here to prevent duplication in
    prerendered snapshots.
  -->

  <!-- JSON-LD Organization Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Enigma Software Systems",
      "url": "https://www.enigmasoftwaresystems.com",
      "email": "hello@enigmasoftwaresystems.com",
      "description": "Custom AI Systems, Mobile Applications, and Web Applications purpose-built for your business.",
      "sameAs": []
    }
    </script>

  <!-- JSON-LD LocalBusiness Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Enigma Software Systems",
      "url": "https://www.enigmasoftwaresystems.com",
      "email": "hello@enigmasoftwaresystems.com",
      "description": "Custom AI systems, mobile applications, and web applications purpose-built for small businesses. Based in Southern Ohio, serving clients nationwide.",
      "priceRange": "$$$$",
      "knowsAbout": ["Custom Software Development", "Artificial Intelligence", "Mobile Applications", "Web Applications", "HIPAA-Compliant Software", "AI Chatbots for Business"],
      "areaServed": [
        { "@type": "State", "name": "Ohio" },
        { "@type": "Country", "name": "United States" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "OH",
        "addressCountry": "US"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Custom Software Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom AI Systems" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Mobile App Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Web Application Development" } }
        ]
      }
    }
  </script>

  <!-- JSON-LD Service Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Services",
      "itemListElement": [
        {
          "@type": "Service",
          "position": 1,
          "name": "Custom AI Systems",
          "description": "Private, branded AI platforms — customer-facing chat assistants, internal knowledge tools, and custom integrations.",
          "url": "https://www.enigmasoftwaresystems.com/ai-systems",
          "provider": { "@type": "Organization", "name": "Enigma Software Systems" }
        },
        {
          "@type": "Service",
          "position": 2,
          "name": "Mobile Applications",
          "description": "Custom iOS and Android apps for scheduling, e-commerce, loyalty programs, and more.",
          "url": "https://www.enigmasoftwaresystems.com/mobile-apps",
          "provider": { "@type": "Organization", "name": "Enigma Software Systems" }
        },
        {
          "@type": "Service",
          "position": 3,
          "name": "Web Applications",
          "description": "Client portals, admin dashboards, and custom web applications built to replace clunky workarounds.",
          "url": "https://www.enigmasoftwaresystems.com/web-apps",
          "provider": { "@type": "Organization", "name": "Enigma Software Systems" }
        }
      ]
    }
  </script>

  <!-- JSON-LD BreadcrumbList Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.enigmasoftwaresystems.com/" },
        { "@type": "ListItem", "position": 2, "name": "Vault", "item": "https://www.enigmasoftwaresystems.com/vault" },
        { "@type": "ListItem", "position": 3, "name": "About", "item": "https://www.enigmasoftwaresystems.com/about" },
        { "@type": "ListItem", "position": 4, "name": "AI Systems", "item": "https://www.enigmasoftwaresystems.com/ai-systems" },
        { "@type": "ListItem", "position": 5, "name": "Mobile Apps", "item": "https://www.enigmasoftwaresystems.com/mobile-apps" },
        { "@type": "ListItem", "position": 6, "name": "Web Apps", "item": "https://www.enigmasoftwaresystems.com/web-apps" },
        { "@type": "ListItem", "position": 7, "name": "Our Process", "item": "https://www.enigmasoftwaresystems.com/how-we-work" },
        { "@type": "ListItem", "position": 8, "name": "Industries", "item": "https://www.enigmasoftwaresystems.com/industries" },
        { "@type": "ListItem", "position": 9, "name": "Pricing", "item": "https://www.enigmasoftwaresystems.com/pricing" },
        { "@type": "ListItem", "position": 10, "name": "FAQ", "item": "https://www.enigmasoftwaresystems.com/faq" },
        { "@type": "ListItem", "position": 11, "name": "Contact", "item": "https://www.enigmasoftwaresystems.com/contact" },
        { "@type": "ListItem", "position": 12, "name": "Blog", "item": "https://www.enigmasoftwaresystems.com/blog" }
      ]
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <noscript>
    <div
      style="max-width:700px;margin:80px auto;padding:24px;font-family:system-ui,sans-serif;text-align:center;color:#e0e0e0;background:#0a0a10;">
      <h1 style="font-size:28px;">Enigma Software Systems</h1>
      <p>Custom AI Systems, Mobile Applications, and Web Applications purpose-built for your business.</p>
      <p style="margin-top:16px;">This site requires JavaScript for the full experience. Please enable JavaScript or <a
          href="mailto:hello@enigmasoftwaresystems.com" style="color:#FF9F41;">contact us directly</a>.</p>
    </div>
  </noscript>
  <!-- Application Entry Point -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
